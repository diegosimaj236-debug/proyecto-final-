<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema Escolar Agua de Vida</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1>Sistema Escolar Agua de Vida</h1>
</header>

<div class="contenedor">

    <div class="formulario">
        <h2>Registrar Alumno</h2>

        <input type="text" id="nombre" placeholder="Nombre completo">

        <select id="grado">
            <option value="">Seleccione grado</option>
            <option>1ro A</option>
            <option>1ro B</option>
            <option>2do A</option>
            <option>2do B</option>
            <option>3ro A</option>
            <option>3ro B</option>
        </select>

        <input type="number" id="nota1" placeholder="Bimestre 1">
        <input type="number" id="nota2" placeholder="Bimestre 2">
        <input type="number" id="nota3" placeholder="Bimestre 3">
        <input type="number" id="nota4" placeholder="Bimestre 4">

        <button onclick="guardarAlumno()">Guardar Alumno</button>
    </div>

    <div class="tabla">
        <h2>Lista de Alumnos</h2>

        <table>
            <thead>
                <tr>
                    <th>Nombre</th>
                    <th>Grado</th>
                    <th>Promedio</th>
                    <th>Acciones</th>
                </tr>
            </thead>

            <tbody id="tablaAlumnos"></tbody>
        </table>
    </div>

</div>

<script src="script.js"></script>
</body>
</html>
